<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>MBG Converter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 440px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 5px;
      font-size: 14px;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f1f8ff;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
    }

    .btn {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #0056b3;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #aaa;
    }

    .highlight {
      font-weight: bold;
      color: #007bff;
    }
    .note {
      text-align: center;
      font-style: italic;
      font-size: 12px;
      color: #666;
      margin-top: -10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>💰 MBG Converter</h2>
  <p class="note">Note: 1 MBG = 1,200,000,000,000 Rupiah</p>

  <!-- Rupiah to MBG -->
  <label>Rupiah (Rp)</label>
  <input 
    type="text" 
    id="rupiahInput" 
    placeholder="Masukkan jumlah Rupiah"
    oninput="formatInputRupiah(this)"
  >

  <button class="btn" onclick="convertToMBG()">Convert ke satuan MBG</button>

  <div class="result" id="mbgResult">Hasil akan tampil di sini</div>

  <div class="divider">— atau —</div>

  <!-- MBG to Rupiah -->
  <label>MBG (Hari)</label>
  <input type="number" id="mbgInput" placeholder="Masukkan jumlah hari MBG">

  <button class="btn" onclick="convertToRupiah()">Convert ke Rupiah</button>

  <div class="result" id="rupiahResult">Hasil akan tampil di sini</div>
</div>

<script>
  const MBG_PER_DAY = 1200000000000;

  // Format input Rupiah (auto 1.000.000)
  function formatInputRupiah(input) {
    let value = input.value.replace(/\D/g, '');

    if (!value) {
      input.value = '';
      return;
    }

    input.value = Number(value).toLocaleString('id-ID');
  }

  function convertToMBG() {
    let raw = document.getElementById('rupiahInput').value;

    const rupiah = parseFloat(raw.replace(/\./g, ''));

    if (isNaN(rupiah) || rupiah <= 0) {
      alert('Masukkan angka yang valid');
      return;
    }

    const totalDays = rupiah / MBG_PER_DAY;

    let totalSeconds = totalDays * 24 * 60 * 60;

    const days = Math.floor(totalSeconds / 86400);
    totalSeconds %= 86400;

    const hours = Math.floor(totalSeconds / 3600);
    totalSeconds %= 3600;

    const minutes = Math.floor(totalSeconds / 60);
    totalSeconds %= 60;

    const seconds = Math.floor(totalSeconds);
    const milliseconds = Math.round((totalSeconds - seconds) * 1000);

    document.getElementById('mbgResult').innerHTML = `
      <strong>Hasil (Desimal):</strong><br>
      Hari: ${totalDays.toFixed(6)}<br><br>

      <strong>Hasil (Breakdown Waktu):</strong><br>
      <span class="highlight">
        ${days} hari ${hours} jam ${minutes} menit ${seconds} detik ${milliseconds} ms
      </span>
    `;
  }

  function convertToRupiah() {
    const mbg = parseFloat(document.getElementById('mbgInput').value);

    if (isNaN(mbg) || mbg <= 0) {
      alert('Masukkan angka yang valid');
      return;
    }

    const rupiah = mbg * MBG_PER_DAY;

    document.getElementById('rupiahResult').innerHTML = `
      <strong>Hasil:</strong><br>
      Rp ${formatRupiah(rupiah)}
    `;
  }

  function formatRupiah(angka) {
    return angka.toLocaleString('id-ID');
  }
</script>

</body>
</html>
